<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>記録</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #0F172A;
    color: #F1F5F9;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 480px; margin: 0 auto; padding: 16px; }
  .login-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; padding: 24px;
  }
  .login-box {
    background: #1E293B; border-radius: 16px; padding: 32px 24px;
    width: 100%; max-width: 360px; border: 1px solid #334155;
  }
  .login-title {
    font-size: 24px; font-weight: 900; text-align: center; margin-bottom: 8px;
    background: linear-gradient(135deg, #38BDF8, #818CF8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .login-sub { font-size: 12px; color: #64748B; text-align: center; margin-bottom: 24px; }
  .login-input {
    width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid #334155;
    background: #0F172A; color: #F1F5F9; font-size: 16px; margin-bottom: 12px;
    font-family: 'Noto Sans JP', sans-serif; outline: none;
  }
  .login-input:focus { border-color: #38BDF8; }
  .login-btn {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, #38BDF8, #818CF8); color: #0F172A;
    font-size: 15px; font-weight: 900; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .login-error { color: #F87171; font-size: 12px; text-align: center; margin-top: 8px; }
  .login-hint { color: #64748B; font-size: 11px; text-align: center; margin-top: 12px; }
  .header { text-align: center; margin-bottom: 16px; position: relative; }
  .header h1 {
    font-size: 22px; font-weight: 900; letter-spacing: -1px;
    background: linear-gradient(135deg, #38BDF8, #818CF8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-sub { font-size: 11px; color: #64748B; margin-top: 4px; }
  .lock-btn {
    position: absolute; top: 0; left: 0; background: none; border: none;
    color: #64748B; font-size: 16px; cursor: pointer;
  }
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .summary-card {
    background: #1E293B; border-radius: 12px; padding: 14px 12px;
    border: 1px solid #334155;
  }
  .summary-label { font-size: 10px; color: #94A3B8; font-weight: 600; }
  .summary-value { font-size: 20px; font-weight: 900; margin-top: 4px; }
  .summary-value.red { color: #F87171; }
  .summary-value.green { color: #34D399; }
  .progress-box {
    background: #1E293B; border-radius: 12px; padding: 14px 16px;
    margin-bottom: 14px; border: 1px solid #334155;
  }
  .progress-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .progress-label { font-size: 11px; color: #94A3B8; font-weight: 600; }
  .progress-pct { font-size: 11px; color: #38BDF8; font-weight: 700; }
  .progress-track { background: #0F172A; border-radius: 99px; height: 10px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, #38BDF8, #818CF8);
    border-radius: 99px; transition: width 0.5s ease;
  }
  .progress-sub { font-size: 10px; color: #64748B; margin-top: 6px; text-align: center; }
  .tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .tab-btn {
    flex: 1; padding: 10px 0; border-radius: 8px; border: none;
    font-size: 12px; font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s;
  }
  .tab-btn.active { background: linear-gradient(135deg, #38BDF8, #818CF8); color: #0F172A; }
  .tab-btn.inactive { background: #1E293B; color: #94A3B8; }
  .filter-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 12px; border-radius: 20px; font-size: 11px;
    font-weight: 600; cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  }
  .filter-btn.active { border: 1.5px solid #38BDF8; background: #1E3A5F; color: #38BDF8; }
  .filter-btn.inactive { border: 1px solid #334155; background: #1E293B; color: #94A3B8; }
  .debt-list { display: flex; flex-direction: column; gap: 8px; }
  .debt-card {
    background: #1E293B; border-radius: 12px; padding: 14px;
    border: 1px solid #334155;
  }
  .debt-card.completed { background: #064E3B; border-color: #10B981; opacity: 0.7; }
  .debt-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .debt-name { font-size: 14px; font-weight: 700; }
  .debt-badge {
    font-size: 9px; padding: 2px 8px; border-radius: 10px; font-weight: 600;
    display: inline-block; margin-left: 8px;
  }
  .badge-loan { background: #FEE2E2; color: #DC2626; }
  .badge-personal { background: #DBEAFE; color: #2563EB; }
  .badge-other { background: #F3E8FF; color: #7C3AED; }
  .debt-rate { font-size: 12px; font-weight: 700; }
  .debt-body { display: flex; justify-content: space-between; align-items: flex-end; }
  .debt-balance-label { font-size: 10px; color: #64748B; }
  .debt-balance { font-size: 18px; font-weight: 900; margin-top: 2px; }
  .debt-monthly-label { font-size: 10px; color: #64748B; text-align: right; }
  .debt-monthly { font-size: 13px; font-weight: 600; color: #94A3B8; margin-top: 2px; }
  .debt-actions { display: flex; gap: 6px; margin-top: 10px; }
  .action-btn {
    flex: 1; padding: 8px; border-radius: 8px; font-size: 11px;
    font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
    border: 1px solid #334155; background: #0F172A; color: #38BDF8;
  }
  .action-btn.refinance { color: #FBBF24; border-color: #92400E; }
  .action-btn.edit { color: #A78BFA; border-color: #5B21B6; }
  .history-item {
    background: #1E293B; border-radius: 10px; padding: 12px 14px;
    border: 1px solid #334155; display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 6px;
  }
  .history-name { font-size: 13px; font-weight: 700; }
  .history-meta { font-size: 10px; color: #64748B; margin-top: 2px; }
  .history-amount { font-size: 15px; font-weight: 900; }
  .history-amount.payment { color: #34D399; }
  .empty-state { text-align: center; padding: 40px; color: #64748B; }
  .empty-icon { font-size: 32px; }
  .empty-text { font-size: 13px; margin-top: 8px; }
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7); display: flex; align-items: flex-end;
    justify-content: center; z-index: 999;
  }
  .modal-box {
    background: #1E293B; border-radius: 20px 20px 0 0; padding: 24px 20px 32px;
    width: 100%; max-width: 480px; border: 1px solid #334155;
    max-height: 85vh; overflow-y: auto;
  }
  .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-close { background: none; border: none; color: #94A3B8; font-size: 20px; cursor: pointer; }
  .form-label { font-size: 11px; color: #94A3B8; font-weight: 600; display: block; margin-bottom: 6px; }
  .form-select, .form-input {
    width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #334155;
    background: #0F172A; color: #F1F5F9; font-size: 14px; margin-bottom: 14px;
    font-family: 'Noto Sans JP', sans-serif; outline: none;
  }
  .form-input:focus, .form-select:focus { border-color: #38BDF8; }
  .submit-btn {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    font-size: 15px; font-weight: 900; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .submit-btn.active { background: linear-gradient(135deg, #38BDF8, #818CF8); color: #0F172A; }
  .submit-btn.disabled { background: #334155; color: #64748B; }
  .submit-btn.refinance-btn { background: linear-gradient(135deg, #FBBF24, #F59E0B); color: #0F172A; }
  .submit-btn.edit-btn { background: linear-gradient(135deg, #A78BFA, #818CF8); color: #0F172A; }
  .submit-btn.add-btn { background: linear-gradient(135deg, #34D399, #38BDF8); color: #0F172A; }
  .submit-btn.delete-btn { background: #7F1D1D; color: #FCA5A5; margin-top: 8px; }
  .footer { margin-top: 24px; text-align: center; padding-bottom: 32px; }
  .reset-btn {
    background: none; border: none; color: #475569; font-size: 11px;
    cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  }
  .reset-confirm { display: flex; gap: 8px; justify-content: center; }
  .reset-yes {
    padding: 6px 16px; border-radius: 6px; border: 1px solid #DC2626;
    background: transparent; color: #DC2626; font-size: 11px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .reset-no {
    padding: 6px 16px; border-radius: 6px; border: 1px solid #334155;
    background: transparent; color: #94A3B8; font-size: 11px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .refinance-arrow { color: #FBBF24; font-size: 12px; text-align: center; margin: 2px 0; }
  .refinance-detail {
    background: #1C1917; border-radius: 8px; padding: 10px 12px;
    margin-bottom: 6px; border: 1px solid #44403C;
  }
  .add-debt-btn {
    width: 100%; padding: 12px; border-radius: 10px; border: 2px dashed #334155;
    background: transparent; color: #64748B; font-size: 13px; font-weight: 700;
    cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
    margin-top: 10px;
  }
  .form-row { display: flex; gap: 10px; }
  .form-row > div { flex: 1; }
  .edit-history {
    background: #1C1917; border-radius: 8px; padding: 10px 12px;
    margin-bottom: 6px; border: 1px solid #44403C;
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
const SALT_KEY='dt_salt',VERIFY_KEY='dt_verify',DATA_KEY='dt_data',VERIFY_TEXT='DEBT_TRACKER_OK';
async function deriveCryptoKey(p,s){const e=new TextEncoder();const k=await crypto.subtle.importKey('raw',e.encode(p),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:s,iterations:100000,hash:'SHA-256'},k,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}
async function encryptData(d,k){const e=new TextEncoder();const iv=crypto.getRandomValues(new Uint8Array(12));const enc=await crypto.subtle.encrypt({name:'AES-GCM',iv},k,e.encode(JSON.stringify(d)));const c=new Uint8Array(iv.length+enc.byteLength);c.set(iv);c.set(new Uint8Array(enc),iv.length);return btoa(String.fromCharCode(...c));}
async function decryptData(b,k){const bin=atob(b);const c=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)c[i]=bin.charCodeAt(i);const iv=c.slice(0,12);const d=c.slice(12);const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv},k,d);return JSON.parse(new TextDecoder().decode(dec));}

const INITIAL_DEBTS=[
  {id:"mobitto",name:"モビット",cat:"消費者金融",bal:857572,rate:12,mp:20000},
  {id:"promise",name:"プロミス",cat:"消費者金融",bal:1175712,rate:15,mp:24000},
  {id:"aiful",name:"アイフル",cat:"消費者金融",bal:478719,rate:18,mp:13000},
  {id:"acom",name:"アコム",cat:"消費者金融",bal:200000,rate:18,mp:13000},
  {id:"kurata",name:"倉田さん",cat:"個人",bal:7520000,rate:0,mp:130000},
  {id:"hinamoto",name:"ヒナモト",cat:"個人",bal:320000,rate:0,mp:40000},
  {id:"hasegawa",name:"長谷川",cat:"個人",bal:380000,rate:0,mp:20000},
  {id:"sumida",name:"隅田",cat:"個人",bal:379091,rate:36,mp:80000},
  {id:"ohno",name:"大野",cat:"個人",bal:70000,rate:0,mp:20000},
  {id:"tsuchiya",name:"土屋",cat:"個人",bal:260000,rate:0,mp:20000},
  {id:"shindo",name:"進藤",cat:"個人",bal:260000,rate:3,mp:20000},
  {id:"fukutani",name:"福谷",cat:"個人",bal:1030000,rate:0,mp:20000},
  {id:"ebihara",name:"海老原",cat:"個人",bal:390000,rate:0,mp:20000},
  {id:"soma",name:"相馬",cat:"個人",bal:500000,rate:0,mp:0},
  {id:"sekine",name:"関根",cat:"個人",bal:300000,rate:0,mp:0},
  {id:"hatada",name:"畑田",cat:"個人",bal:800000,rate:0,mp:0},
  {id:"jasso",name:"学生支援機構",cat:"その他",bal:null,rate:null,mp:19544},
  {id:"medical",name:"メディカル",cat:"その他",bal:600000,rate:0,mp:27000},
];
const ORIG_TOTAL=INITIAL_DEBTS.reduce((s,d)=>s+(d.bal||0),0);

let state={screen:'login',cryptoKey:null,salt:null,debts:INITIAL_DEBTS.map(d=>({...d})),payments:[],origTotal:ORIG_TOTAL,tab:'overview',filter:'all',modal:null,selectedDebt:'',payAmount:'',payNote:'',refFrom:'',refTo:'',refAmount:'',refNote:'',editDebtId:'',editBal:'',editMp:'',editRate:'',editName:'',editCat:'',addName:'',addCat:'消費者金融',addBal:'',addRate:'',addMp:'',loginPw:'',setupPw:'',setupPw2:'',error:'',confirmReset:false,confirmDelete:false};

function fmt(n){if(n==null)return'不明';return n.toLocaleString('ja-JP');}
function getRateColor(r){if(r==null)return'#6B7280';if(r>=18)return'#DC2626';if(r>=12)return'#EA580C';if(r>=3)return'#CA8A04';if(r>0)return'#65A30D';return'#6B7280';}
function getBadgeClass(c){if(c==='消費者金融')return'badge-loan';if(c==='個人')return'badge-personal';return'badge-other';}

async function saveState(){if(!state.cryptoKey)return;try{const d={debts:state.debts,payments:state.payments,origTotal:state.origTotal};const enc=await encryptData(d,state.cryptoKey);localStorage.setItem(DATA_KEY,enc);}catch(e){console.error(e);}}
async function loadState(){if(!state.cryptoKey)return false;try{const r=localStorage.getItem(DATA_KEY);if(!r)return false;const d=await decryptData(r,state.cryptoKey);if(d.debts)state.debts=d.debts;if(d.payments)state.payments=d.payments;if(d.origTotal)state.origTotal=d.origTotal;return true;}catch(e){return false;}}

async function handleSetup(){
  if(!state.setupPw||state.setupPw.length<4){state.error='パスワードは4文字以上';render();return;}
  if(state.setupPw!==state.setupPw2){state.error='パスワードが一致しません';render();return;}
  const salt=crypto.getRandomValues(new Uint8Array(16));
  const key=await deriveCryptoKey(state.setupPw,salt);
  const verify=await encryptData(VERIFY_TEXT,key);
  localStorage.setItem(SALT_KEY,btoa(String.fromCharCode(...salt)));
  localStorage.setItem(VERIFY_KEY,verify);
  state.cryptoKey=key;state.salt=salt;state.screen='main';state.error='';
  await saveState();render();
}
async function handleLogin(){
  if(!state.loginPw){state.error='パスワードを入力してください';render();return;}
  try{
    const sb=localStorage.getItem(SALT_KEY);const salt=new Uint8Array(atob(sb).split('').map(c=>c.charCodeAt(0)));
    const key=await deriveCryptoKey(state.loginPw,salt);
    const ve=localStorage.getItem(VERIFY_KEY);const result=await decryptData(ve,key);
    if(result!==VERIFY_TEXT)throw new Error();
    state.cryptoKey=key;state.salt=salt;await loadState();state.screen='main';state.error='';
  }catch(e){state.error='パスワードが違います';}
  render();
}
function handleLogout(){state.cryptoKey=null;state.screen='login';state.loginPw='';state.error='';render();}

async function recordPayment(){
  if(!state.selectedDebt||!state.payAmount)return;
  const amt=parseInt(state.payAmount);if(isNaN(amt)||amt<=0)return;
  const p={id:Date.now().toString(),type:'payment',debtId:state.selectedDebt,amount:amt,note:state.payNote,date:new Date().toISOString()};
  state.debts=state.debts.map(d=>{if(d.id===state.selectedDebt&&d.bal!=null)return{...d,bal:Math.max(0,d.bal-amt)};return d;});
  state.payments=[p,...state.payments];
  state.modal=null;state.selectedDebt='';state.payAmount='';state.payNote='';
  await saveState();render();
}
async function recordRefinance(){
  if(!state.refFrom||!state.refTo||!state.refAmount)return;
  const amt=parseInt(state.refAmount);if(isNaN(amt)||amt<=0)return;
  const r={id:Date.now().toString(),type:'refinance',fromId:state.refFrom,toId:state.refTo,amount:amt,note:state.refNote,date:new Date().toISOString()};
  state.debts=state.debts.map(d=>{
    if(d.id===state.refTo&&d.bal!=null)return{...d,bal:Math.max(0,d.bal-amt)};
    if(d.id===state.refFrom&&d.bal!=null)return{...d,bal:d.bal+amt};return d;
  });
  state.payments=[r,...state.payments];
  state.modal=null;state.refFrom='';state.refTo='';state.refAmount='';state.refNote='';
  await saveState();render();
}
async function saveEdit(){
  const id=state.editDebtId;if(!id)return;
  const newBal=state.editBal===''?null:parseInt(state.editBal);
  const newMp=parseInt(state.editMp)||0;
  const newRate=parseFloat(state.editRate)||0;
  const newName=state.editName.trim();
  const newCat=state.editCat;
  if(!newName)return;
  const old=state.debts.find(d=>d.id===id);
  const ch=[];
  if(old.bal!==newBal)ch.push('残高: ¥'+fmt(old.bal)+' → ¥'+fmt(newBal));
  if(old.mp!==newMp)ch.push('月返済: ¥'+fmt(old.mp)+' → ¥'+fmt(newMp));
  if(old.rate!==newRate)ch.push('金利: '+old.rate+'% → '+newRate+'%');
  if(old.name!==newName)ch.push('名前: '+old.name+' → '+newName);
  if(old.cat!==newCat)ch.push('区分: '+old.cat+' → '+newCat);
  if(ch.length>0){const rec={id:Date.now().toString(),type:'edit',debtId:id,changes:ch,date:new Date().toISOString()};state.payments=[rec,...state.payments];}
  state.debts=state.debts.map(d=>{if(d.id===id)return{...d,bal:newBal,mp:newMp,rate:newRate,name:newName,cat:newCat};return d;});
  state.modal=null;state.confirmDelete=false;
  await saveState();render();
}
async function addDebt(){
  const name=state.addName.trim();if(!name)return;
  const bal=state.addBal===''?null:parseInt(state.addBal);
  const rate=parseFloat(state.addRate)||0;
  const mp=parseInt(state.addMp)||0;
  const id='custom_'+Date.now();
  state.debts=[...state.debts,{id,name,cat:state.addCat,bal,rate,mp}];
  if(bal)state.origTotal+=bal;
  const rec={id:Date.now().toString(),type:'add',debtId:id,debtName:name,date:new Date().toISOString()};
  state.payments=[rec,...state.payments];
  state.modal=null;state.addName='';state.addCat='消費者金融';state.addBal='';state.addRate='';state.addMp='';
  await saveState();render();
}
async function deleteDebt(id){
  const debt=state.debts.find(d=>d.id===id);
  const rec={id:Date.now().toString(),type:'delete',debtId:id,debtName:debt?.name,date:new Date().toISOString()};
  state.payments=[rec,...state.payments];
  state.debts=state.debts.filter(d=>d.id!==id);
  state.modal=null;state.confirmDelete=false;
  await saveState();render();
}
async function resetAll(){
  state.debts=INITIAL_DEBTS.map(d=>({...d}));state.payments=[];state.origTotal=ORIG_TOTAL;state.confirmReset=false;
  await saveState();render();
}

function render(){
  const app=document.getElementById('app');
  if(state.screen==='login'||state.screen==='setup'){
    const has=localStorage.getItem(SALT_KEY)!=null;
    if(!has)state.screen='setup';else if(state.screen==='setup')state.screen='login';
    if(state.screen==='setup'){
      app.innerHTML='<div class="login-screen"><div class="login-box"><div class="login-title">記録</div><div class="login-sub">初期設定 - パスワードを決めてください</div><input class="login-input" type="password" id="setupPw" placeholder="パスワード（4文字以上）"><input class="login-input" type="password" id="setupPw2" placeholder="パスワード（確認）"><button class="login-btn" id="setupBtn">設定する</button>'+(state.error?'<div class="login-error">'+state.error+'</div>':'')+'<div class="login-hint">🔒 このパスワードでデータを暗号化します</div></div></div>';
      document.getElementById('setupPw').oninput=e=>{state.setupPw=e.target.value;};
      document.getElementById('setupPw2').oninput=e=>{state.setupPw2=e.target.value;};
      document.getElementById('setupBtn').onclick=handleSetup;return;
    }
    app.innerHTML='<div class="login-screen"><div class="login-box"><div class="login-title">記録</div><div class="login-sub">パスワードを入力してください</div><input class="login-input" type="password" id="loginPw" placeholder="パスワード"><button class="login-btn" id="loginBtn">ログイン</button>'+(state.error?'<div class="login-error">'+state.error+'</div>':'')+'<div class="login-hint">🔒 AES-256暗号化で保護されています</div></div></div>';
    const pw=document.getElementById('loginPw');pw.oninput=e=>{state.loginPw=e.target.value;};pw.onkeydown=e=>{if(e.key==='Enter')handleLogin();};
    document.getElementById('loginBtn').onclick=handleLogin;return;
  }

  const totalDebt=state.debts.reduce((s,d)=>s+(d.bal||0),0);
  const totalMonthly=state.debts.reduce((s,d)=>s+(d.mp||0),0);
  const paidTotal=state.payments.reduce((s,p)=>(p.type==='payment'?s+p.amount:s),0);
  const progress=state.origTotal>0?Math.min(100,(paidTotal/state.origTotal)*100):0;
  const filtered=state.filter==='all'?state.debts:state.debts.filter(d=>d.cat===state.filter);
  const sorted=[...filtered].sort((a,b)=>(b.rate||0)-(a.rate||0));
  const getName=id=>(state.debts.find(d=>d.id===id)||{}).name||id;
  const activeDebts=state.debts.filter(d=>d.bal==null||d.bal>0);

  let cards=sorted.map(d=>{
    const done=d.bal===0;
    return '<div class="debt-card'+(done?' completed':'')+'"><div class="debt-header"><div><span class="debt-name'+(done?' completed-text':'')+'">'+(done?'✅ ':'')+d.name+'</span><span class="debt-badge '+getBadgeClass(d.cat)+'">'+d.cat+'</span></div>'+(d.rate!=null&&d.rate>0?'<span class="debt-rate" style="color:'+getRateColor(d.rate)+'">'+d.rate+'%</span>':'')+'</div><div class="debt-body"><div><div class="debt-balance-label">残高</div><div class="debt-balance" style="color:'+(done?'#34D399':'#F1F5F9')+'">'+(done?'完済！':'¥'+fmt(d.bal))+'</div></div><div><div class="debt-monthly-label">月返済</div><div class="debt-monthly">'+(d.mp>0?'¥'+fmt(d.mp):'未定')+'</div></div></div><div class="debt-actions">'+(!done&&d.bal!=null?'<button class="action-btn" onclick="openPayment(\''+d.id+'\','+( d.mp||0)+')">返済</button><button class="action-btn refinance" onclick="openRefinance(\''+d.id+'\')">借換</button>':'')+'<button class="action-btn edit" onclick="openEdit(\''+d.id+'\')">編集</button></div></div>';
  }).join('');

  let hist='';
  if(state.payments.length===0){hist='<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-text">まだ記録がありません</div></div>';}
  else{hist=state.payments.map(p=>{
    const d=new Date(p.date);const ds=d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
    if(p.type==='refinance')return '<div class="refinance-detail"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:12px;font-weight:700;color:#FBBF24">🔄 借り換え</div><div style="font-size:11px;color:#94A3B8;margin-top:2px">'+getName(p.fromId)+' → '+getName(p.toId)+'</div><div style="font-size:10px;color:#64748B;margin-top:2px">'+ds+(p.note?' · '+p.note:'')+'</div></div><span style="font-size:15px;font-weight:900;color:#FBBF24">¥'+fmt(p.amount)+'</span></div></div>';
    if(p.type==='edit')return '<div class="edit-history"><div style="font-size:12px;font-weight:700;color:#A78BFA">✏️ 編集 - '+getName(p.debtId)+'</div><div style="font-size:10px;color:#94A3B8;margin-top:4px">'+p.changes.join('<br>')+'</div><div style="font-size:10px;color:#64748B;margin-top:4px">'+ds+'</div></div>';
    if(p.type==='add')return '<div class="edit-history"><div style="font-size:12px;font-weight:700;color:#34D399">➕ 追加 - '+p.debtName+'</div><div style="font-size:10px;color:#64748B;margin-top:4px">'+ds+'</div></div>';
    if(p.type==='delete')return '<div class="edit-history"><div style="font-size:12px;font-weight:700;color:#F87171">🗑️ 削除 - '+p.debtName+'</div><div style="font-size:10px;color:#64748B;margin-top:4px">'+ds+'</div></div>';
    return '<div class="history-item"><div><div class="history-name">'+getName(p.debtId)+'</div><div class="history-meta">'+ds+(p.note?' · '+p.note:'')+'</div></div><span class="history-amount payment">-¥'+fmt(p.amount)+'</span></div>';
  }).join('');}

  let editModal='';
  if(state.modal==='edit'){
    const d=state.debts.find(x=>x.id===state.editDebtId);
    if(d){
      editModal='<div class="modal-overlay" onclick="closeModal(event)"><div class="modal-box" onclick="event.stopPropagation()"><div class="modal-header"><div class="modal-title">✏️ 編集 - '+d.name+'</div><button class="modal-close" onclick="state.modal=null;state.confirmDelete=false;render()">✕</button></div><label class="form-label">名前</label><input class="form-input" type="text" id="editName" value="'+state.editName+'"><label class="form-label">区分</label><select class="form-select" id="editCat">'+['消費者金融','個人','その他'].map(c=>'<option value="'+c+'"'+(state.editCat===c?' selected':'')+'>'+c+'</option>').join('')+'</select><div class="form-row"><div><label class="form-label">残高（円）</label><input class="form-input" type="number" id="editBal" placeholder="空欄=不明" value="'+state.editBal+'"></div><div><label class="form-label">金利（%）</label><input class="form-input" type="number" step="0.1" id="editRate" value="'+state.editRate+'"></div></div><label class="form-label">月返済額（円）</label><input class="form-input" type="number" id="editMp" value="'+state.editMp+'"><button class="submit-btn edit-btn" onclick="saveEdit()">保存する</button>'+(!state.confirmDelete?'<button class="submit-btn delete-btn" onclick="state.confirmDelete=true;render()">この借入を削除</button>':'<div style="display:flex;gap:8px;margin-top:8px"><button class="submit-btn delete-btn" style="flex:1" onclick="deleteDebt(\''+d.id+'\')">本当に削除</button><button class="submit-btn disabled" style="flex:1" onclick="state.confirmDelete=false;render()">キャンセル</button></div>')+'</div></div>';
    }
  }

  app.innerHTML='<div class="container"><div class="header"><button class="lock-btn" onclick="handleLogout()">🔒</button><h1>記録</h1><div class="header-sub">田之村 亮汰</div></div><div class="summary-grid"><div class="summary-card"><div class="summary-label">借入残高</div><div class="summary-value red">¥'+fmt(totalDebt)+'</div></div><div class="summary-card"><div class="summary-label">返済済み</div><div class="summary-value green">¥'+fmt(paidTotal)+'</div></div></div><div class="progress-box"><div class="progress-header"><span class="progress-label">返済進捗</span><span class="progress-pct">'+progress.toFixed(1)+'%</span></div><div class="progress-track"><div class="progress-fill" style="width:'+progress+'%"></div></div><div class="progress-sub">月の返済合計: ¥'+fmt(totalMonthly)+'</div></div><div class="tabs"><button class="tab-btn '+(state.tab==='overview'?'active':'inactive')+'" onclick="setTab(\'overview\')">一覧</button><button class="tab-btn '+(state.tab==='history'?'active':'inactive')+'" onclick="setTab(\'history\')">履歴</button></div>'+(state.tab==='overview'?'<div class="filter-row">'+['all','消費者金融','個人','その他'].map(c=>'<button class="filter-btn '+(state.filter===c?'active':'inactive')+'" onclick="setFilter(\''+c+'\')">'+(c==='all'?'全て':c)+'</button>').join('')+'</div><div class="debt-list">'+cards+'</div><button class="add-debt-btn" onclick="openAdd()">＋ 新しい借入を追加</button>':hist)+'<div class="footer">'+(!state.confirmReset?'<button class="reset-btn" onclick="state.confirmReset=true;render()">データをリセット</button>':'<div class="reset-confirm"><button class="reset-yes" onclick="resetAll()">本当にリセット</button><button class="reset-no" onclick="state.confirmReset=false;render()">キャンセル</button></div>')+'</div></div>'+(state.modal==='payment'?'<div class="modal-overlay" onclick="closeModal(event)"><div class="modal-box" onclick="event.stopPropagation()"><div class="modal-header"><div class="modal-title">返済を記録</div><button class="modal-close" onclick="state.modal=null;render()">✕</button></div><label class="form-label">返済先</label><select class="form-select" id="payDebt"><option value="">選択</option>'+activeDebts.map(d=>'<option value="'+d.id+'"'+(state.selectedDebt===d.id?' selected':'')+'>'+d.name+'（¥'+fmt(d.bal)+'）</option>').join('')+'</select><label class="form-label">金額（円）</label><input class="form-input" type="number" id="payAmt" placeholder="20000" value="'+state.payAmount+'"><label class="form-label">メモ（任意）</label><input class="form-input" type="text" id="payNote" placeholder="業績給から一括返済" value="'+state.payNote+'"><button class="submit-btn '+(state.selectedDebt&&state.payAmount?'active':'disabled')+'" onclick="recordPayment()">記録する</button></div></div>':'')+(state.modal==='refinance'?'<div class="modal-overlay" onclick="closeModal(event)"><div class="modal-box" onclick="event.stopPropagation()"><div class="modal-header"><div class="modal-title">🔄 借り換え</div><button class="modal-close" onclick="state.modal=null;render()">✕</button></div><label class="form-label">借入先（残高が増える）</label><select class="form-select" id="refFrom"><option value="">選択</option>'+activeDebts.map(d=>'<option value="'+d.id+'"'+(state.refFrom===d.id?' selected':'')+'>'+d.name+'（'+( d.rate||0)+'%）</option>').join('')+'</select><div class="refinance-arrow">↓ お金の流れ ↓</div><label class="form-label">返済先（残高が減る）</label><select class="form-select" id="refTo"><option value="">選択</option>'+activeDebts.map(d=>'<option value="'+d.id+'"'+(state.refTo===d.id?' selected':'')+'>'+d.name+'（'+(d.rate||0)+'%）</option>').join('')+'</select><label class="form-label">金額（円）</label><input class="form-input" type="number" id="refAmt" placeholder="20000" value="'+state.refAmount+'"><label class="form-label">メモ（任意）</label><input class="form-input" type="text" id="refNt" placeholder="毎日の借り換え" value="'+state.refNote+'"><button class="submit-btn '+(state.refFrom&&state.refTo&&state.refAmount?'refinance-btn':'disabled')+'" onclick="recordRefinance()">借り換えを記録</button></div></div>':'')+editModal+(state.modal==='add'?'<div class="modal-overlay" onclick="closeModal(event)"><div class="modal-box" onclick="event.stopPropagation()"><div class="modal-header"><div class="modal-title">➕ 新しい借入を追加</div><button class="modal-close" onclick="state.modal=null;render()">✕</button></div><label class="form-label">名前</label><input class="form-input" type="text" id="addName" placeholder="例: 三井住友カード" value="'+state.addName+'"><label class="form-label">区分</label><select class="form-select" id="addCat">'+['消費者金融','個人','その他'].map(c=>'<option value="'+c+'"'+(state.addCat===c?' selected':'')+'>'+c+'</option>').join('')+'</select><div class="form-row"><div><label class="form-label">残高（円）</label><input class="form-input" type="number" id="addBal" placeholder="空欄=不明" value="'+state.addBal+'"></div><div><label class="form-label">金利（%）</label><input class="form-input" type="number" step="0.1" id="addRate" placeholder="0" value="'+state.addRate+'"></div></div><label class="form-label">月返済額（円）</label><input class="form-input" type="number" id="addMp" placeholder="0" value="'+state.addMp+'"><button class="submit-btn '+(state.addName?'add-btn':'disabled')+'" onclick="addDebt()">追加する</button></div></div>':'');

  if(state.modal==='payment'){
    document.getElementById('payDebt').onchange=e=>{state.selectedDebt=e.target.value;render();};
    document.getElementById('payAmt').oninput=e=>{state.payAmount=e.target.value;};
    document.getElementById('payNote').oninput=e=>{state.payNote=e.target.value;};
  }
  if(state.modal==='refinance'){
    document.getElementById('refFrom').onchange=e=>{state.refFrom=e.target.value;render();};
    document.getElementById('refTo').onchange=e=>{state.refTo=e.target.value;render();};
    document.getElementById('refAmt').oninput=e=>{state.refAmount=e.target.value;};
    document.getElementById('refNt').oninput=e=>{state.refNote=e.target.value;};
  }
  if(state.modal==='edit'){
    document.getElementById('editName').oninput=e=>{state.editName=e.target.value;};
    document.getElementById('editCat').onchange=e=>{state.editCat=e.target.value;};
    document.getElementById('editBal').oninput=e=>{state.editBal=e.target.value;};
    document.getElementById('editRate').oninput=e=>{state.editRate=e.target.value;};
    document.getElementById('editMp').oninput=e=>{state.editMp=e.target.value;};
  }
  if(state.modal==='add'){
    document.getElementById('addName').oninput=e=>{state.addName=e.target.value;render();};
    document.getElementById('addCat').onchange=e=>{state.addCat=e.target.value;};
    document.getElementById('addBal').oninput=e=>{state.addBal=e.target.value;};
    document.getElementById('addRate').oninput=e=>{state.addRate=e.target.value;};
    document.getElementById('addMp').oninput=e=>{state.addMp=e.target.value;};
  }
}

window.setTab=t=>{state.tab=t;render();};
window.setFilter=f=>{state.filter=f;render();};
window.openPayment=(id,mp)=>{state.modal='payment';state.selectedDebt=id;state.payAmount=mp>0?mp.toString():'';state.payNote='';render();};
window.openRefinance=toId=>{state.modal='refinance';state.refTo=toId;state.refFrom='';state.refAmount='';state.refNote='';render();};
window.openEdit=id=>{const d=state.debts.find(x=>x.id===id);if(!d)return;state.modal='edit';state.editDebtId=id;state.editName=d.name;state.editCat=d.cat;state.editBal=d.bal!=null?d.bal.toString():'';state.editRate=d.rate!=null?d.rate.toString():'0';state.editMp=(d.mp||0).toString();state.confirmDelete=false;render();};
window.openAdd=()=>{state.modal='add';state.addName='';state.addCat='消費者金融';state.addBal='';state.addRate='';state.addMp='';render();};
window.closeModal=e=>{if(e.target.classList.contains('modal-overlay')){state.modal=null;state.confirmDelete=false;render();}};
window.handleLogout=handleLogout;
window.recordPayment=recordPayment;
window.recordRefinance=recordRefinance;
window.saveEdit=saveEdit;
window.addDebt=addDebt;
window.deleteDebt=deleteDebt;
window.resetAll=resetAll;
window.state=state;
window.render=render;
render();
</script>
</body>
</html>
