<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>返済トラッカー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #0F172A;
    color: #F1F5F9;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 480px; margin: 0 auto; padding: 16px; }

  /* Login Screen */
  .login-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; padding: 24px;
  }
  .login-box {
    background: #1E293B; border-radius: 16px; padding: 32px 24px;
    width: 100%; max-width: 360px; border: 1px solid #334155;
  }
  .login-title {
    font-size: 24px; font-weight: 900; text-align: center; margin-bottom: 8px;
    background: linear-gradient(135deg, #38BDF8, #818CF8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .login-sub { font-size: 12px; color: #64748B; text-align: center; margin-bottom: 24px; }
  .login-input {
    width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid #334155;
    background: #0F172A; color: #F1F5F9; font-size: 16px; margin-bottom: 12px;
    font-family: 'Noto Sans JP', sans-serif; outline: none;
  }
  .login-input:focus { border-color: #38BDF8; }
  .login-btn {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, #38BDF8, #818CF8); color: #0F172A;
    font-size: 15px; font-weight: 900; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .login-btn:disabled { background: #334155; color: #64748B; }
  .login-error { color: #F87171; font-size: 12px; text-align: center; margin-top: 8px; }
  .login-hint { color: #64748B; font-size: 11px; text-align: center; margin-top: 12px; }

  /* Header */
  .header { text-align: center; margin-bottom: 16px; position: relative; }
  .header h1 {
    font-size: 22px; font-weight: 900; letter-spacing: -1px;
    background: linear-gradient(135deg, #38BDF8, #818CF8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-sub { font-size: 11px; color: #64748B; margin-top: 4px; }
  .logout-btn {
    position: absolute; top: 0; right: 0; background: none; border: none;
    color: #64748B; font-size: 11px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  }
  .lock-btn {
    position: absolute; top: 0; left: 0; background: none; border: none;
    color: #64748B; font-size: 16px; cursor: pointer;
  }

  /* Summary */
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .summary-card {
    background: #1E293B; border-radius: 12px; padding: 14px 12px;
    border: 1px solid #334155;
  }
  .summary-label { font-size: 10px; color: #94A3B8; font-weight: 600; }
  .summary-value { font-size: 20px; font-weight: 900; margin-top: 4px; }
  .summary-value.red { color: #F87171; }
  .summary-value.green { color: #34D399; }

  /* Progress */
  .progress-box {
    background: #1E293B; border-radius: 12px; padding: 14px 16px;
    margin-bottom: 14px; border: 1px solid #334155;
  }
  .progress-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .progress-label { font-size: 11px; color: #94A3B8; font-weight: 600; }
  .progress-pct { font-size: 11px; color: #38BDF8; font-weight: 700; }
  .progress-track { background: #0F172A; border-radius: 99px; height: 10px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, #38BDF8, #818CF8);
    border-radius: 99px; transition: width 0.5s ease;
  }
  .progress-sub { font-size: 10px; color: #64748B; margin-top: 6px; text-align: center; }

  /* Tabs */
  .tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .tab-btn {
    flex: 1; padding: 10px 0; border-radius: 8px; border: none;
    font-size: 13px; font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s;
  }
  .tab-btn.active { background: linear-gradient(135deg, #38BDF8, #818CF8); color: #0F172A; }
  .tab-btn.inactive { background: #1E293B; color: #94A3B8; }

  /* Filter */
  .filter-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 12px; border-radius: 20px; font-size: 11px;
    font-weight: 600; cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s;
  }
  .filter-btn.active { border: 1.5px solid #38BDF8; background: #1E3A5F; color: #38BDF8; }
  .filter-btn.inactive { border: 1px solid #334155; background: #1E293B; color: #94A3B8; }

  /* Debt Card */
  .debt-list { display: flex; flex-direction: column; gap: 8px; }
  .debt-card {
    background: #1E293B; border-radius: 12px; padding: 14px;
    border: 1px solid #334155;
  }
  .debt-card.completed { background: #064E3B; border-color: #10B981; opacity: 0.7; }
  .debt-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .debt-name { font-size: 14px; font-weight: 700; }
  .debt-name.completed-text { color: #34D399; }
  .debt-badge {
    font-size: 9px; padding: 2px 8px; border-radius: 10px; font-weight: 600;
    display: inline-block; margin-left: 8px;
  }
  .badge-loan { background: #FEE2E2; color: #DC2626; }
  .badge-personal { background: #DBEAFE; color: #2563EB; }
  .badge-other { background: #F3E8FF; color: #7C3AED; }
  .debt-rate { font-size: 12px; font-weight: 700; }
  .debt-body { display: flex; justify-content: space-between; align-items: flex-end; }
  .debt-balance-label { font-size: 10px; color: #64748B; }
  .debt-balance { font-size: 18px; font-weight: 900; margin-top: 2px; }
  .debt-monthly-label { font-size: 10px; color: #64748B; text-align: right; }
  .debt-monthly { font-size: 13px; font-weight: 600; color: #94A3B8; margin-top: 2px; }
  .debt-actions { display: flex; gap: 6px; margin-top: 10px; }
  .action-btn {
    flex: 1; padding: 8px; border-radius: 8px; font-size: 12px;
    font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
    border: 1px solid #334155; background: #0F172A; color: #38BDF8;
  }
  .action-btn.refinance { color: #FBBF24; border-color: #92400E; }

  /* History */
  .history-item {
    background: #1E293B; border-radius: 10px; padding: 12px 14px;
    border: 1px solid #334155; display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 6px;
  }
  .history-name { font-size: 13px; font-weight: 700; }
  .history-meta { font-size: 10px; color: #64748B; margin-top: 2px; }
  .history-amount { font-size: 15px; font-weight: 900; }
  .history-amount.payment { color: #34D399; }
  .history-amount.refinance-label { color: #FBBF24; }
  .empty-state { text-align: center; padding: 40px; color: #64748B; }
  .empty-icon { font-size: 32px; }
  .empty-text { font-size: 13px; margin-top: 8px; }

  /* Modal */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7); display: flex; align-items: flex-end;
    justify-content: center; z-index: 999;
  }
  .modal-box {
    background: #1E293B; border-radius: 20px 20px 0 0; padding: 24px 20px 32px;
    width: 100%; max-width: 480px; border: 1px solid #334155;
  }
  .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-close {
    background: none; border: none; color: #94A3B8; font-size: 20px; cursor: pointer;
  }
  .form-label { font-size: 11px; color: #94A3B8; font-weight: 600; display: block; margin-bottom: 6px; }
  .form-select, .form-input {
    width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #334155;
    background: #0F172A; color: #F1F5F9; font-size: 14px; margin-bottom: 14px;
    font-family: 'Noto Sans JP', sans-serif; outline: none;
  }
  .form-input:focus, .form-select:focus { border-color: #38BDF8; }
  .submit-btn {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    font-size: 15px; font-weight: 900; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .submit-btn.active { background: linear-gradient(135deg, #38BDF8, #818CF8); color: #0F172A; }
  .submit-btn.disabled { background: #334155; color: #64748B; }
  .submit-btn.refinance-btn { background: linear-gradient(135deg, #FBBF24, #F59E0B); color: #0F172A; }

  /* Footer */
  .footer { margin-top: 24px; text-align: center; padding-bottom: 32px; }
  .reset-btn {
    background: none; border: none; color: #475569; font-size: 11px;
    cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  }
  .reset-confirm { display: flex; gap: 8px; justify-content: center; }
  .reset-yes {
    padding: 6px 16px; border-radius: 6px; border: 1px solid #DC2626;
    background: transparent; color: #DC2626; font-size: 11px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .reset-no {
    padding: 6px 16px; border-radius: 6px; border: 1px solid #334155;
    background: transparent; color: #94A3B8; font-size: 11px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .refinance-detail {
    background: #1C1917; border-radius: 8px; padding: 10px 12px;
    margin-bottom: 6px; border: 1px solid #44403C;
  }
  .refinance-arrow { color: #FBBF24; font-size: 12px; text-align: center; margin: 2px 0; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ============ CRYPTO UTILS ============
const SALT_KEY = 'dt_salt';
const VERIFY_KEY = 'dt_verify';
const DATA_KEY = 'dt_data';
const VERIFY_TEXT = 'DEBT_TRACKER_OK';

async function deriveCryptoKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}

async function encryptData(data, key) {
  const enc = new TextEncoder();
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(JSON.stringify(data)));
  const combined = new Uint8Array(iv.length + encrypted.byteLength);
  combined.set(iv);
  combined.set(new Uint8Array(encrypted), iv.length);
  return btoa(String.fromCharCode(...combined));
}

async function decryptData(base64, key) {
  const binary = atob(base64);
  const combined = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) combined[i] = binary.charCodeAt(i);
  const iv = combined.slice(0, 12);
  const data = combined.slice(12);
  const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
  return JSON.parse(new TextDecoder().decode(decrypted));
}

// ============ INITIAL DATA ============
const INITIAL_DEBTS = [
  { id:"mobitto", name:"モビット", cat:"消費者金融", bal:857572, rate:12, mp:20000 },
  { id:"promise", name:"プロミス", cat:"消費者金融", bal:1175712, rate:15, mp:24000 },
  { id:"aiful", name:"アイフル", cat:"消費者金融", bal:478719, rate:18, mp:13000 },
  { id:"acom", name:"アコム", cat:"消費者金融", bal:200000, rate:18, mp:13000 },
  { id:"kurata", name:"倉田さん", cat:"個人", bal:7520000, rate:0, mp:130000 },
  { id:"hinamoto", name:"ヒナモト", cat:"個人", bal:320000, rate:0, mp:40000 },
  { id:"hasegawa", name:"長谷川", cat:"個人", bal:380000, rate:0, mp:20000 },
  { id:"sumida", name:"隅田", cat:"個人", bal:379091, rate:36, mp:80000 },
  { id:"ohno", name:"大野", cat:"個人", bal:70000, rate:0, mp:20000 },
  { id:"tsuchiya", name:"土屋", cat:"個人", bal:260000, rate:0, mp:20000 },
  { id:"shindo", name:"進藤", cat:"個人", bal:260000, rate:3, mp:20000 },
  { id:"fukutani", name:"福谷", cat:"個人", bal:1030000, rate:0, mp:20000 },
  { id:"ebihara", name:"海老原", cat:"個人", bal:390000, rate:0, mp:20000 },
  { id:"soma", name:"相馬", cat:"個人", bal:500000, rate:0, mp:0 },
  { id:"sekine", name:"関根", cat:"個人", bal:300000, rate:0, mp:0 },
  { id:"hatada", name:"畑田", cat:"個人", bal:800000, rate:0, mp:0 },
  { id:"jasso", name:"学生支援機構", cat:"その他", bal:null, rate:null, mp:19544 },
  { id:"medical", name:"メディカル", cat:"その他", bal:600000, rate:0, mp:27000 },
];

const ORIG_TOTAL = INITIAL_DEBTS.reduce((s,d) => s + (d.bal || 0), 0);

// ============ APP STATE ============
let state = {
  screen: 'login', // login | setup | main
  cryptoKey: null,
  salt: null,
  debts: [...INITIAL_DEBTS.map(d => ({...d}))],
  payments: [],
  tab: 'overview',
  filter: 'all',
  modal: null, // null | 'payment' | 'refinance'
  selectedDebt: '',
  payAmount: '',
  payNote: '',
  refFrom: '',
  refTo: '',
  refAmount: '',
  refNote: '',
  loginPw: '',
  setupPw: '',
  setupPw2: '',
  error: '',
  confirmReset: false,
};

function fmt(n) {
  if (n == null) return '不明';
  return n.toLocaleString('ja-JP');
}

function getRateColor(rate) {
  if (rate == null) return '#6B7280';
  if (rate >= 18) return '#DC2626';
  if (rate >= 12) return '#EA580C';
  if (rate >= 3) return '#CA8A04';
  if (rate > 0) return '#65A30D';
  return '#6B7280';
}

function getBadgeClass(cat) {
  if (cat === '消費者金融') return 'badge-loan';
  if (cat === '個人') return 'badge-personal';
  return 'badge-other';
}

// ============ PERSISTENCE ============
async function saveState() {
  if (!state.cryptoKey) return;
  try {
    const data = { debts: state.debts, payments: state.payments };
    const encrypted = await encryptData(data, state.cryptoKey);
    localStorage.setItem(DATA_KEY, encrypted);
  } catch(e) { console.error('Save error', e); }
}

async function loadState() {
  if (!state.cryptoKey) return false;
  try {
    const raw = localStorage.getItem(DATA_KEY);
    if (!raw) return false;
    const data = await decryptData(raw, state.cryptoKey);
    if (data.debts) state.debts = data.debts;
    if (data.payments) state.payments = data.payments;
    return true;
  } catch(e) { return false; }
}

// ============ AUTH ============
async function handleSetup() {
  if (!state.setupPw || state.setupPw.length < 4) {
    state.error = 'パスワードは4文字以上で設定してください';
    render(); return;
  }
  if (state.setupPw !== state.setupPw2) {
    state.error = 'パスワードが一致しません';
    render(); return;
  }
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const key = await deriveCryptoKey(state.setupPw, salt);
  const verify = await encryptData(VERIFY_TEXT, key);
  localStorage.setItem(SALT_KEY, btoa(String.fromCharCode(...salt)));
  localStorage.setItem(VERIFY_KEY, verify);
  state.cryptoKey = key;
  state.salt = salt;
  state.screen = 'main';
  state.error = '';
  await saveState();
  render();
}

async function handleLogin() {
  if (!state.loginPw) { state.error = 'パスワードを入力してください'; render(); return; }
  try {
    const saltB64 = localStorage.getItem(SALT_KEY);
    const salt = new Uint8Array(atob(saltB64).split('').map(c => c.charCodeAt(0)));
    const key = await deriveCryptoKey(state.loginPw, salt);
    const verifyEnc = localStorage.getItem(VERIFY_KEY);
    const result = await decryptData(verifyEnc, key);
    if (result !== VERIFY_TEXT) throw new Error();
    state.cryptoKey = key;
    state.salt = salt;
    await loadState();
    state.screen = 'main';
    state.error = '';
  } catch(e) {
    state.error = 'パスワードが違います';
  }
  render();
}

function handleLogout() {
  state.cryptoKey = null;
  state.screen = 'login';
  state.loginPw = '';
  state.error = '';
  render();
}

// ============ ACTIONS ============
async function recordPayment() {
  if (!state.selectedDebt || !state.payAmount) return;
  const amount = parseInt(state.payAmount);
  if (isNaN(amount) || amount <= 0) return;
  const payment = {
    id: Date.now().toString(), type: 'payment',
    debtId: state.selectedDebt, amount,
    note: state.payNote, date: new Date().toISOString()
  };
  state.debts = state.debts.map(d => {
    if (d.id === state.selectedDebt && d.bal != null)
      return {...d, bal: Math.max(0, d.bal - amount)};
    return d;
  });
  state.payments = [payment, ...state.payments];
  state.modal = null; state.selectedDebt = ''; state.payAmount = ''; state.payNote = '';
  await saveState(); render();
}

async function recordRefinance() {
  if (!state.refFrom || !state.refTo || !state.refAmount) return;
  const amount = parseInt(state.refAmount);
  if (isNaN(amount) || amount <= 0) return;
  const record = {
    id: Date.now().toString(), type: 'refinance',
    fromId: state.refFrom, toId: state.refTo, amount,
    note: state.refNote, date: new Date().toISOString()
  };
  state.debts = state.debts.map(d => {
    if (d.id === state.refTo && d.bal != null)
      return {...d, bal: Math.max(0, d.bal - amount)};
    if (d.id === state.refFrom && d.bal != null)
      return {...d, bal: d.bal + amount};
    return d;
  });
  state.payments = [record, ...state.payments];
  state.modal = null; state.refFrom = ''; state.refTo = ''; state.refAmount = ''; state.refNote = '';
  await saveState(); render();
}

async function resetAll() {
  state.debts = INITIAL_DEBTS.map(d => ({...d}));
  state.payments = [];
  state.confirmReset = false;
  await saveState(); render();
}

// ============ RENDER ============
function render() {
  const app = document.getElementById('app');

  if (state.screen === 'login' || state.screen === 'setup') {
    const hasAccount = localStorage.getItem(SALT_KEY) != null;
    if (!hasAccount) state.screen = 'setup';
    else if (state.screen === 'setup') state.screen = 'login';

    if (state.screen === 'setup') {
      app.innerHTML = `
        <div class="login-screen">
          <div class="login-box">
            <div class="login-title">返済トラッカー</div>
            <div class="login-sub">初期設定 - パスワードを決めてください</div>
            <input class="login-input" type="password" id="setupPw" placeholder="パスワード（4文字以上）" value="${state.setupPw}">
            <input class="login-input" type="password" id="setupPw2" placeholder="パスワード（確認）" value="${state.setupPw2}">
            <button class="login-btn" id="setupBtn">設定する</button>
            ${state.error ? `<div class="login-error">${state.error}</div>` : ''}
            <div class="login-hint">🔒 このパスワードでデータを暗号化します</div>
          </div>
        </div>`;
      document.getElementById('setupPw').oninput = e => { state.setupPw = e.target.value; };
      document.getElementById('setupPw2').oninput = e => { state.setupPw2 = e.target.value; };
      document.getElementById('setupBtn').onclick = handleSetup;
      return;
    }

    app.innerHTML = `
      <div class="login-screen">
        <div class="login-box">
          <div class="login-title">返済トラッカー</div>
          <div class="login-sub">パスワードを入力してください</div>
          <input class="login-input" type="password" id="loginPw" placeholder="パスワード" value="${state.loginPw}">
          <button class="login-btn" id="loginBtn">ログイン</button>
          ${state.error ? `<div class="login-error">${state.error}</div>` : ''}
          <div class="login-hint">🔒 AES-256暗号化で保護されています</div>
        </div>
      </div>`;
    const pwInput = document.getElementById('loginPw');
    pwInput.oninput = e => { state.loginPw = e.target.value; };
    pwInput.onkeydown = e => { if (e.key === 'Enter') handleLogin(); };
    document.getElementById('loginBtn').onclick = handleLogin;
    return;
  }

  // ========= MAIN SCREEN =========
  const totalDebt = state.debts.reduce((s,d) => s + (d.bal || 0), 0);
  const totalMonthly = state.debts.reduce((s,d) => s + (d.mp || 0), 0);
  const paidTotal = state.payments.reduce((s,p) => {
    if (p.type === 'payment') return s + p.amount;
    return s;
  }, 0);
  const progress = ORIG_TOTAL > 0 ? Math.min(100, (paidTotal / ORIG_TOTAL) * 100) : 0;

  const filtered = state.filter === 'all'
    ? state.debts
    : state.debts.filter(d => d.cat === state.filter);
  const sorted = [...filtered].sort((a,b) => (b.rate||0) - (a.rate||0));

  const getName = id => (state.debts.find(d => d.id === id) || {}).name || id;

  let debtCards = sorted.map(d => {
    const done = d.bal === 0;
    return `
      <div class="debt-card${done ? ' completed' : ''}">
        <div class="debt-header">
          <div>
            <span class="debt-name${done ? ' completed-text' : ''}">${done ? '✅ ' : ''}${d.name}</span>
            <span class="debt-badge ${getBadgeClass(d.cat)}">${d.cat}</span>
          </div>
          ${d.rate != null && d.rate > 0 ? `<span class="debt-rate" style="color:${getRateColor(d.rate)}">${d.rate}%</span>` : ''}
        </div>
        <div class="debt-body">
          <div>
            <div class="debt-balance-label">残高</div>
            <div class="debt-balance" style="color:${done ? '#34D399' : '#F1F5F9'}">${done ? '完済！' : '¥' + fmt(d.bal)}</div>
          </div>
          <div>
            <div class="debt-monthly-label">月返済</div>
            <div class="debt-monthly">${d.mp > 0 ? '¥' + fmt(d.mp) : '未定'}</div>
          </div>
        </div>
        ${!done && d.bal != null ? `
          <div class="debt-actions">
            <button class="action-btn" onclick="openPayment('${d.id}', ${d.mp || 0})">返済を記録</button>
            <button class="action-btn refinance" onclick="openRefinance('${d.id}')">借り換え</button>
          </div>
        ` : ''}
      </div>`;
  }).join('');

  let historyHTML = '';
  if (state.payments.length === 0) {
    historyHTML = `<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-text">まだ返済記録がありません</div></div>`;
  } else {
    historyHTML = state.payments.map(p => {
      const d = new Date(p.date);
      const ds = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
      if (p.type === 'refinance') {
        return `
          <div class="refinance-detail">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div>
                <div style="font-size:12px;font-weight:700;color:#FBBF24">🔄 借り換え</div>
                <div style="font-size:11px;color:#94A3B8;margin-top:2px">${getName(p.fromId)} → ${getName(p.toId)}</div>
                <div style="font-size:10px;color:#64748B;margin-top:2px">${ds}${p.note ? ' · ' + p.note : ''}</div>
              </div>
              <span style="font-size:15px;font-weight:900;color:#FBBF24">¥${fmt(p.amount)}</span>
            </div>
          </div>`;
      }
      return `
        <div class="history-item">
          <div>
            <div class="history-name">${getName(p.debtId)}</div>
            <div class="history-meta">${ds}${p.note ? ' · ' + p.note : ''}</div>
          </div>
          <span class="history-amount payment">-¥${fmt(p.amount)}</span>
        </div>`;
    }).join('');
  }

  const activeDebts = state.debts.filter(d => d.bal == null || d.bal > 0);

  app.innerHTML = `
    <div class="container">
      <div class="header">
        <button class="lock-btn" onclick="handleLogout()">🔒</button>
        <h1>返済トラッカー</h1>
        <div class="header-sub">田之村 亮汰</div>
      </div>

      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-label">借入残高</div>
          <div class="summary-value red">¥${fmt(totalDebt)}</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">返済済み</div>
          <div class="summary-value green">¥${fmt(paidTotal)}</div>
        </div>
      </div>

      <div class="progress-box">
        <div class="progress-header">
          <span class="progress-label">返済進捗</span>
          <span class="progress-pct">${progress.toFixed(1)}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:${progress}%"></div>
        </div>
        <div class="progress-sub">月の返済合計: ¥${fmt(totalMonthly)}</div>
      </div>

      <div class="tabs">
        <button class="tab-btn ${state.tab === 'overview' ? 'active' : 'inactive'}" onclick="setTab('overview')">一覧</button>
        <button class="tab-btn ${state.tab === 'history' ? 'active' : 'inactive'}" onclick="setTab('history')">返済履歴</button>
      </div>

      ${state.tab === 'overview' ? `
        <div class="filter-row">
          ${['all','消費者金融','個人','その他'].map(c => `
            <button class="filter-btn ${state.filter === c ? 'active' : 'inactive'}" onclick="setFilter('${c}')">${c === 'all' ? '全て' : c}</button>
          `).join('')}
        </div>
        <div class="debt-list">${debtCards}</div>
      ` : historyHTML}

      <div class="footer">
        ${!state.confirmReset
          ? `<button class="reset-btn" onclick="state.confirmReset=true;render()">データをリセット</button>`
          : `<div class="reset-confirm">
              <button class="reset-yes" onclick="resetAll()">本当にリセット</button>
              <button class="reset-no" onclick="state.confirmReset=false;render()">キャンセル</button>
            </div>`
        }
      </div>
    </div>

    ${state.modal === 'payment' ? `
      <div class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-box" onclick="event.stopPropagation()">
          <div class="modal-header">
            <div class="modal-title">返済を記録</div>
            <button class="modal-close" onclick="state.modal=null;render()">✕</button>
          </div>
          <label class="form-label">返済先</label>
          <select class="form-select" id="payDebt" value="${state.selectedDebt}">
            <option value="">選択してください</option>
            ${activeDebts.map(d => `<option value="${d.id}" ${state.selectedDebt===d.id?'selected':''}>${d.name}（残高: ¥${fmt(d.bal)}）</option>`).join('')}
          </select>
          <label class="form-label">返済金額（円）</label>
          <input class="form-input" type="number" id="payAmt" placeholder="例: 20000" value="${state.payAmount}">
          <label class="form-label">メモ（任意）</label>
          <input class="form-input" type="text" id="payNote" placeholder="例: 業績給から一括返済" value="${state.payNote}">
          <button class="submit-btn ${state.selectedDebt && state.payAmount ? 'active' : 'disabled'}" onclick="recordPayment()">記録する</button>
        </div>
      </div>
    ` : ''}

    ${state.modal === 'refinance' ? `
      <div class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-box" onclick="event.stopPropagation()">
          <div class="modal-header">
            <div class="modal-title">🔄 借り換えを記録</div>
            <button class="modal-close" onclick="state.modal=null;render()">✕</button>
          </div>
          <label class="form-label">借入先（残高が増える方）</label>
          <select class="form-select" id="refFrom">
            <option value="">選択してください</option>
            ${activeDebts.map(d => `<option value="${d.id}" ${state.refFrom===d.id?'selected':''}>${d.name}（${d.rate||0}%）</option>`).join('')}
          </select>
          <div class="refinance-arrow">↓ お金の流れ ↓</div>
          <label class="form-label">返済先（残高が減る方）</label>
          <select class="form-select" id="refTo">
            <option value="">選択してください</option>
            ${activeDebts.map(d => `<option value="${d.id}" ${state.refTo===d.id?'selected':''}>${d.name}（${d.rate||0}%）</option>`).join('')}
          </select>
          <label class="form-label">金額（円）</label>
          <input class="form-input" type="number" id="refAmt" placeholder="例: 20000" value="${state.refAmount}">
          <label class="form-label">メモ（任意）</label>
          <input class="form-input" type="text" id="refNt" placeholder="例: 毎日の借り換え" value="${state.refNote}">
          <button class="submit-btn ${state.refFrom && state.refTo && state.refAmount ? 'refinance-btn' : 'disabled'}" onclick="recordRefinance()">借り換えを記録</button>
        </div>
      </div>
    ` : ''}
  `;

  // Bind modal inputs
  if (state.modal === 'payment') {
    document.getElementById('payDebt').onchange = e => { state.selectedDebt = e.target.value; render(); };
    document.getElementById('payAmt').oninput = e => { state.payAmount = e.target.value; };
    document.getElementById('payNote').oninput = e => { state.payNote = e.target.value; };
  }
  if (state.modal === 'refinance') {
    document.getElementById('refFrom').onchange = e => { state.refFrom = e.target.value; render(); };
    document.getElementById('refTo').onchange = e => { state.refTo = e.target.value; render(); };
    document.getElementById('refAmt').oninput = e => { state.refAmount = e.target.value; };
    document.getElementById('refNt').oninput = e => { state.refNote = e.target.value; };
  }
}

// ============ GLOBAL FUNCTIONS ============
window.setTab = t => { state.tab = t; render(); };
window.setFilter = f => { state.filter = f; render(); };
window.openPayment = (id, mp) => {
  state.modal = 'payment'; state.selectedDebt = id;
  state.payAmount = mp > 0 ? mp.toString() : ''; state.payNote = ''; render();
};
window.openRefinance = (toId) => {
  state.modal = 'refinance'; state.refTo = toId;
  state.refFrom = ''; state.refAmount = ''; state.refNote = ''; render();
};
window.closeModal = (e) => { if (e.target.classList.contains('modal-overlay')) { state.modal = null; render(); } };
window.handleLogout = handleLogout;
window.recordPayment = recordPayment;
window.recordRefinance = recordRefinance;
window.resetAll = resetAll;
window.state = state;
window.render = render;

// ============ INIT ============
render();
</script>
</body>
</html>
